      Hint: text
      Value: |
        <div class="ck-content"><p style="-webkit-text-stroke-width:0px;background-color:rgb(255, 255, 255);box-sizing:border-box;color:rgb(80, 80, 80);font-family:Lato, sans-serif;font-size:18px;font-style:normal;font-variant-caps:normal;font-variant-ligatures:normal;font-weight:400;letter-spacing:normal;margin-bottom:15px;margin-top:0px;orphans:2;text-align:left;text-decoration-color:initial;text-decoration-style:initial;text-decoration-thickness:initial;text-indent:0px;text-transform:none;white-space:normal;widows:2;word-spacing:0px;">Gain insights into industry-shaping trends on AI and its applications by examining use cases that showcase how AI drives transformation and innovation. A panel of industry leaders will discuss how advisors are adapting their roles and skills. You will learn to navigate challenges and prepare for the future. You’ll also learn how AI enhances advisor effectiveness and how to tailor new skills and approaches to AI. We’ll also address ethical, regulatory and security considerations while discussing strategies to embed and build AI literacy.</p><h2 style="-webkit-text-stroke-width:0px;background-color:rgb(255, 255, 255);box-sizing:border-box;color:rgb(78, 86, 101);font-family:&quot;Playfair Display&quot;, serif;font-size:34px;font-style:normal;font-variant-caps:normal;font-variant-ligatures:normal;letter-spacing:normal;line-height:38px;margin-bottom:10px;margin-top:0px;orphans:2;text-align:left;text-decoration-color:initial;text-decoration-style:initial;text-decoration-thickness:initial;text-indent:0px;text-transform:none;white-space:normal;widows:2;word-spacing:0px;"><strong>Discussion Highlights</strong></h2><ul style="-webkit-text-stroke-width:0px;background-color:rgb(255, 255, 255);box-sizing:border-box;color:rgb(80, 80, 80);font-family:Lato, sans-serif;font-size:18px;font-style:normal;font-variant-caps:normal;font-variant-ligatures:normal;font-weight:400;letter-spacing:normal;list-style:none;margin-bottom:14px;margin-top:0px;orphans:2;overflow:hidden;padding-left:36px;text-align:left;text-decoration-color:initial;text-decoration-style:initial;text-decoration-thickness:initial;text-indent:0px;text-transform:none;white-space:normal;widows:2;word-spacing:0px;"><li style="box-sizing:border-box;margin-bottom:12px;position:relative;"><strong style="box-sizing:border-box;font-weight:bolder;">Examine the current trends and use cases leading the change</strong> (e.g. trends shaping the industry and examples)</li><li style="box-sizing:border-box;margin-bottom:12px;position:relative;"><strong style="box-sizing:border-box;font-weight:bolder;">Understand the power of AI and future roles/skills for advisors in the AI era</strong> (e.g. how advisors can leverage AI to deliver personalized value)</li><li style="box-sizing:border-box;margin-bottom:12px;position:relative;"><strong style="box-sizing:border-box;font-weight:bolder;">Explore challenges and considerations</strong> (e.g. ethical concerns, regulatory landscape, confidentiality, data security/risks and accessibility of AI tools)</li><li style="box-sizing:border-box;margin-bottom:12px;position:relative;"><strong style="box-sizing:border-box;font-weight:bolder;">Prepare for the future </strong>(e.g. balancing the application of AI with personalization and human touch and building AI literacy with peers and clients)</li></ul><h2 style="-webkit-text-stroke-width:0px;background-color:rgb(255, 255, 255);box-sizing:border-box;color:rgb(78, 86, 101);font-family:&quot;Playfair Display&quot;, serif;font-size:34px;font-style:normal;font-variant-caps:normal;font-variant-ligatures:normal;letter-spacing:normal;line-height:38px;margin-bottom:10px;margin-top:26px;orphans:2;text-align:left;text-decoration-color:initial;text-decoration-style:initial;text-decoration-thickness:initial;text-indent:0px;text-transform:none;white-space:normal;widows:2;word-spacing:0px;"><strong>Speakers</strong></h2><ul style="-webkit-text-stroke-width:0px;background-color:rgb(255, 255, 255);box-sizing:border-box;color:rgb(80, 80, 80);font-family:Lato, sans-serif;font-size:18px;font-style:normal;font-variant-caps:normal;font-variant-ligatures:normal;font-weight:400;letter-spacing:normal;list-style:none;margin-bottom:14px;margin-top:0px;orphans:2;overflow:hidden;padding-left:36px;text-align:left;text-decoration-color:initial;text-decoration-style:initial;text-decoration-thickness:initial;text-indent:0px;text-transform:none;white-space:normal;widows:2;word-spacing:0px;"><li style="box-sizing:border-box;margin-bottom:12px;position:relative;"><strong style="box-sizing:border-box;font-weight:bolder;">Rahim Nota</strong>, Senior Manager, Wealth &amp; Asset Management, Consulting,Ernst &amp; Young LLP</li><li style="box-sizing:border-box;margin-bottom:12px;position:relative;"><strong style="box-sizing:border-box;font-weight:bolder;">Joseph Correnti</strong>, Managing Director, Ernst &amp; Young LLP</li><li style="box-sizing:border-box;margin-bottom:12px;position:relative;"><strong style="box-sizing:border-box;font-weight:bolder;">Dave Coffaro</strong>, Principal, Strategic Advisory Consulting Group</li></ul><h2 style="-webkit-text-stroke-width:0px;background-color:rgb(255, 255, 255);box-sizing:border-box;color:rgb(78, 86, 101);font-family:&quot;Playfair Display&quot;, serif;font-size:34px;font-style:normal;font-variant-caps:normal;font-variant-ligatures:normal;letter-spacing:normal;line-height:38px;margin-bottom:10px;margin-top:26px;orphans:2;text-align:left;text-decoration-color:initial;text-decoration-style:initial;text-decoration-thickness:initial;text-indent:0px;text-transform:none;white-space:normal;widows:2;word-spacing:0px;"><strong>Audience</strong></h2><ul style="-webkit-text-stroke-width:0px;background-color:rgb(255, 255, 255);box-sizing:border-box;color:rgb(80, 80, 80);font-family:Lato, sans-serif;font-size:18px;font-style:normal;font-variant-caps:normal;font-variant-ligatures:normal;font-weight:400;letter-spacing:normal;list-style:none;margin-bottom:14px;margin-top:0px;orphans:2;overflow:hidden;padding-left:36px;text-align:left;text-decoration-color:initial;text-decoration-style:initial;text-decoration-thickness:initial;text-indent:0px;text-transform:none;white-space:normal;widows:2;word-spacing:0px;"><li style="box-sizing:border-box;margin-bottom:12px;position:relative;">Wealth Management Advisors</li><li style="box-sizing:border-box;margin-bottom:12px;position:relative;">Wealth Managers</li><li style="box-sizing:border-box;margin-bottom:12px;position:relative;">Trust and Fiduciary Advisors</li><li style="box-sizing:border-box;margin-bottom:12px;position:relative;">Trust Officers</li><li style="box-sizing:border-box;margin-bottom:12px;position:relative;">Estate Planners</li><li style="box-sizing:border-box;margin-bottom:12px;position:relative;">Trust Counsel</li><li style="box-sizing:border-box;margin-bottom:12px;position:relative;">Trust Department Managers</li><li style="box-sizing:border-box;margin-bottom:12px;position:relative;">Private Bankers</li><li style="box-sizing:border-box;margin-bottom:12px;position:relative;">Trust Tax Professionals</li><li style="box-sizing:border-box;margin-bottom:12px;position:relative;">Financial Planners</li><li style="box-sizing:border-box;margin-bottom:12px;position:relative;">CTFAs, CISPs, CRSPs, CPAs, CFPs</li></ul><h2 style="-webkit-text-stroke-width:0px;background-color:rgb(255, 255, 255);box-sizing:border-box;color:rgb(78, 86, 101);font-family:&quot;Playfair Display&quot;, serif;font-size:34px;font-style:normal;font-variant-caps:normal;font-variant-ligatures:normal;letter-spacing:normal;line-height:38px;margin-bottom:10px;margin-top:26px;orphans:2;text-align:left;text-decoration-color:initial;text-decoration-style:initial;text-decoration-thickness:initial;text-indent:0px;text-transform:none;white-space:normal;widows:2;word-spacing:0px;"><strong>Credits</strong></h2><p style="-webkit-text-stroke-width:0px;background-color:rgb(255, 255, 255);box-sizing:border-box;color:rgb(80, 80, 80);font-family:Lato, sans-serif;font-size:18px;font-style:normal;font-variant-caps:normal;font-variant-ligatures:normal;font-weight:400;letter-spacing:normal;margin-bottom:15px;margin-top:0px;orphans:2;text-align:left;text-decoration-color:initial;text-decoration-style:initial;text-decoration-thickness:initial;text-indent:0px;text-transform:none;white-space:normal;widows:2;word-spacing:0px;">ABA Professional Certifications: 1.25 <a style="background-color:transparent;box-sizing:border-box;color:rgb(0, 96, 185);cursor:pointer;font-family:Lato, sans-serif;transition:color 0.25s ease-in-out;" href="https://www.aba.com/training-events/certifications/certified-aml-and-fraud-professional"><strong><u>CAFP</u></strong></a>, 1.25 <a style="background-color:transparent;box-sizing:border-box;color:rgb(0, 96, 185);cursor:pointer;font-family:Lato, sans-serif;transition:color 0.25s ease-in-out;" href="https://www.aba.com/training-events/certifications/certified-trust-and-fiduciary-advisor"><strong><u>CTFA</u></strong></a>; 1.2 CPE (Specialized Knowledge); 1.0 CFP</p><p style="-webkit-text-stroke-width:0px;background-color:rgb(255, 255, 255);box-sizing:border-box;color:rgb(80, 80, 80);font-family:Lato, sans-serif;font-size:18px;font-style:normal;font-variant-caps:normal;font-variant-ligatures:normal;font-weight:400;letter-spacing:normal;margin-bottom:15px;margin-top:0px;orphans:2;text-align:left;text-decoration-color:initial;text-decoration-style:initial;text-decoration-thickness:initial;text-indent:0px;text-transform:none;white-space:normal;widows:2;word-spacing:0px;">The Certified Financial Planners Board has granted 1.0 credit for this live webinar. Recordings are not eligible for CFP credits.</p><p style="-webkit-text-stroke-width:0px;background-color:rgb(255, 255, 255);box-sizing:border-box;color:rgb(80, 80, 80);font-family:Lato, sans-serif;font-size:18px;font-style:normal;font-variant-caps:normal;font-variant-ligatures:normal;font-weight:400;letter-spacing:normal;margin-bottom:15px;margin-top:0px;orphans:2;text-align:left;text-decoration-color:initial;text-decoration-style:initial;text-decoration-thickness:initial;text-indent:0px;text-transform:none;white-space:normal;widows:2;word-spacing:0px;">This intermediate level, Group Internet-based webinar is eligible for 1.2 CPEs for CPAs (various fields of study). Recordings are not eligible for CPE credits.</p><p style="-webkit-text-stroke-width:0px;background-color:rgb(255, 255, 255);box-sizing:border-box;color:rgb(80, 80, 80);font-family:Lato, sans-serif;font-size:18px;font-style:normal;font-variant-caps:normal;font-variant-ligatures:normal;font-weight:400;letter-spacing:normal;margin-bottom:15px;margin-top:0px;orphans:2;text-align:left;text-decoration-color:initial;text-decoration-style:initial;text-decoration-thickness:initial;text-indent:0px;text-transform:none;white-space:normal;widows:2;word-spacing:0px;"><strong style="box-sizing:border-box;font-weight:bolder;">Prerequisite</strong> — Attendees should have background knowledge of the field of wealth management and trust within the financial services industry.</p><p style="-webkit-text-stroke-width:0px;background-color:rgb(255, 255, 255);box-sizing:border-box;color:rgb(80, 80, 80);font-family:Lato, sans-serif;font-size:18px;font-style:normal;font-variant-caps:normal;font-variant-ligatures:normal;font-weight:400;letter-spacing:normal;margin-bottom:15px;margin-top:0px;orphans:2;text-align:left;text-decoration-color:initial;text-decoration-style:initial;text-decoration-thickness:initial;text-indent:0px;text-transform:none;white-space:normal;widows:2;word-spacing:0px;"><strong style="box-sizing:border-box;font-weight:bolder;">Advanced Preparation </strong>— None</p><p style="-webkit-text-stroke-width:0px;background-color:rgb(255, 255, 255);box-sizing:border-box;color:rgb(80, 80, 80);font-family:Lato, sans-serif;font-size:18px;font-style:normal;font-variant-caps:normal;font-variant-ligatures:normal;font-weight:400;letter-spacing:normal;margin-bottom:15px;margin-top:0px;orphans:2;text-align:left;text-decoration-color:initial;text-decoration-style:initial;text-decoration-thickness:initial;text-indent:0px;text-transform:none;white-space:normal;widows:2;word-spacing:0px;">For more information regarding refund, complaint and program cancellation policies, contact American Bankers Association at <a style="background-color:transparent;box-sizing:border-box;color:rgb(0, 96, 185);cursor:pointer;font-family:Lato, sans-serif;transition:color 0.25s ease-in-out;" href="tel:1-800-BANKERS"><strong><u>1-800-BANKERS</u></strong></a>.</p><p style="-webkit-text-stroke-width:0px;background-color:rgb(255, 255, 255);box-sizing:border-box;color:rgb(80, 80, 80);font-family:Lato, sans-serif;font-size:18px;font-style:normal;font-variant-caps:normal;font-variant-ligatures:normal;font-weight:400;letter-spacing:normal;margin-bottom:15px;margin-top:0px;orphans:2;text-align:left;text-decoration-color:initial;text-decoration-style:initial;text-decoration-thickness:initial;text-indent:0px;text-transform:none;white-space:normal;widows:2;word-spacing:0px;"><em style="box-sizing:border-box;"><em>Credits are subject to change.</em></em></p><p style="-webkit-text-stroke-width:0px;background-color:rgb(255, 255, 255);box-sizing:border-box;color:rgb(80, 80, 80);font-family:Lato, sans-serif;font-size:18px;font-style:normal;font-variant-caps:normal;font-variant-ligatures:normal;font-weight:400;letter-spacing:normal;margin-bottom:15px;margin-top:0px;orphans:2;text-align:left;text-decoration-color:initial;text-decoration-style:initial;text-decoration-thickness:initial;text-indent:0px;text-transform:none;white-space:normal;widows:2;word-spacing:0px;">&nbsp;</p></div>
