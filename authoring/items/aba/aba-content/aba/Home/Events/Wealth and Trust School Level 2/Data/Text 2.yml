        <div class="ck-content"><h3>&nbsp;<br /><strong>Hone Your Expertise</strong></h3><p style="-webkit-text-stroke-width:0px;background-color:rgb(255, 255, 255);box-sizing:border-box;color:rgb(80, 80, 80);font-family:Lato, sans-serif;font-size:18px;font-style:normal;font-variant-caps:normal;font-variant-ligatures:normal;font-weight:400;letter-spacing:normal;margin-bottom:15px;margin-top:0px;orphans:2;text-align:left;text-decoration-color:initial;text-decoration-style:initial;text-decoration-thickness:initial;text-indent:0px;text-transform:none;white-space:normal;widows:2;word-spacing:0px;">Level 2 offers a curriculum designed for existing fiduciaries to augment their skills and apply what they learned in Level 1. The emphasis will be on aligning industry principles with advanced trust concepts; topics covered include special needs trusts, portfolio management and investments.&nbsp;</p><p style="-webkit-text-stroke-width:0px;background-color:rgb(255, 255, 255);box-sizing:border-box;color:rgb(80, 80, 80);font-family:Lato, sans-serif;font-size:18px;font-style:normal;font-variant-caps:normal;font-variant-ligatures:normal;font-weight:400;letter-spacing:normal;margin-bottom:15px;margin-top:0px;orphans:2;text-align:left;text-decoration-color:initial;text-decoration-style:initial;text-decoration-thickness:initial;text-indent:0px;text-transform:none;white-space:normal;widows:2;word-spacing:0px;"><strong style="box-sizing:border-box;font-weight:bolder;">Interested in the CTFA?</strong>&nbsp;After completing Wealth and Trust Schools Level 1 and 2, the pre-certification education requirement is fully met for the Certified Trust and Fiduciary Advisor (CTFA) designation. Review the full list of <a style="background-color:transparent;box-sizing:border-box;color:rgb(0, 96, 185);cursor:pointer;font-family:Lato, sans-serif;transition:color 0.25s ease-in-out;" href="https://www.aba.com/training-events/certifications/certified-trust-and-fiduciary-advisor/eligibility-requirements"><strong><u>eligibility requirements to sit for the CTFA exam</u></strong></a>.</p><p style="-webkit-text-stroke-width:0px;background-color:rgb(255, 255, 255);box-sizing:border-box;color:rgb(80, 80, 80);font-family:Lato, sans-serif;font-size:18px;font-style:normal;font-variant-caps:normal;font-variant-ligatures:normal;font-weight:400;letter-spacing:normal;margin-bottom:15px;margin-top:0px;orphans:2;text-align:left;text-decoration-color:initial;text-decoration-style:initial;text-decoration-thickness:initial;text-indent:0px;text-transform:none;white-space:normal;widows:2;word-spacing:0px;"><strong style="box-sizing:border-box;font-weight:bolder;">Upcoming school dates: October 19-23, 2026</strong></p><p style="-webkit-text-stroke-width:0px;background-color:rgb(255, 255, 255);box-sizing:border-box;color:rgb(80, 80, 80);font-family:Lato, sans-serif;font-size:18px;font-style:normal;font-variant-caps:normal;font-variant-ligatures:normal;font-weight:400;letter-spacing:normal;margin-bottom:15px;margin-top:0px;orphans:2;text-align:left;text-decoration-color:initial;text-decoration-style:initial;text-decoration-thickness:initial;text-indent:0px;text-transform:none;white-space:normal;widows:2;word-spacing:0px;">&nbsp;</p></div>
