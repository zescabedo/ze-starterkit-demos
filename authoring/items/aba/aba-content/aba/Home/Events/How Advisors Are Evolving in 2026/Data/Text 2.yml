        <div class="ck-content"><p style="color:#505050;font-family:Lato;font-size:13.5pt;margin-bottom:11pt;margin-top:0pt;"><span style="background-color:white;">Gain insights into industry-shaping trends on AI and its applications by examining use cases that showcase how AI drives transformation and innovation. A panel of industry leaders will discuss how advisors are adapting their roles and skills. You will learn to navigate challenges and prepare for the future. You’ll also learn how AI enhances advisor effectiveness and how to tailor new skills and approaches to AI. We’ll also address ethical, regulatory and security considerations while discussing strategies to embed and build AI literacy.</span></p><p style="color:#4E5665;font-family:&quot;Playfair Display&quot;;font-size:25.5pt;margin-bottom:7pt;margin-top:0pt;"><span style="background-color:white;"><strong>Discussion Highlights</strong></span></p><ul style="direction:ltr;list-style-type:disc;margin-bottom:0in;margin-top:0in;unicode-bidi:embed;" type="disc"><li style="color:#505050;margin-bottom:9pt;margin-top:0pt;vertical-align:middle;"><span style="background-color:white;"><span style="font-family:Lato;font-size:13.5pt;"><strong>Examine the current trends and use cases leading the change</strong>&nbsp;(e.g. trends shaping the industry and examples)</span></span></li><li style="color:#505050;margin-bottom:9pt;margin-top:0pt;vertical-align:middle;"><span style="background-color:white;"><span style="font-family:Lato;font-size:13.5pt;"><strong>Understand the power of AI and future roles/skills for advisors in the AI era</strong>&nbsp;(e.g. how advisors can leverage AI to deliver personalized value)</span></span></li><li style="color:#505050;margin-bottom:9pt;margin-top:0pt;vertical-align:middle;"><span style="background-color:white;"><span style="font-family:Lato;font-size:13.5pt;"><strong>Explore challenges and considerations</strong>&nbsp;(e.g. ethical concerns, regulatory landscape, confidentiality, data security/risks and accessibility of AI tools)</span></span></li><li style="color:#505050;margin-bottom:9pt;margin-top:0pt;vertical-align:middle;"><span style="background-color:white;"><span style="font-family:Lato;font-size:13.5pt;"><strong>Prepare for the future&nbsp;</strong>(e.g. balancing the application of AI with personalization and human touch and building AI literacy with peers and clients)</span></span></li></ul><p style="color:#4E5665;font-family:&quot;Playfair Display&quot;;font-size:25.5pt;margin-bottom:7pt;margin-top:19pt;"><span style="background-color:white;"><strong>Speakers</strong></span></p><ul style="direction:ltr;list-style-type:disc;margin-bottom:0in;margin-top:0in;unicode-bidi:embed;" type="disc"><li style="color:#505050;margin-bottom:9pt;margin-top:0pt;vertical-align:middle;"><span style="background-color:white;"><span style="font-family:Lato;font-size:13.5pt;"><strong>Rahim Nota</strong>, Senior Manager, Wealth &amp; Asset Management, Consulting,Ernst &amp; Young LLP</span></span></li><li style="color:#505050;margin-bottom:9pt;margin-top:0pt;vertical-align:middle;"><span style="background-color:white;"><span style="font-family:Lato;font-size:13.5pt;"><strong>Joseph Correnti</strong>, Managing Director, Ernst &amp; Young LLP</span></span></li><li style="color:#505050;margin-bottom:9pt;margin-top:0pt;vertical-align:middle;"><span style="background-color:white;"><span style="font-family:Lato;font-size:13.5pt;"><strong>Dave Coffaro</strong>, Principal, Strategic Advisory Consulting Group</span></span></li></ul><p style="color:#4E5665;font-family:&quot;Playfair Display&quot;;font-size:25.5pt;margin-bottom:7pt;margin-top:19pt;"><span style="background-color:white;"><strong>Audience</strong></span></p><ul style="direction:ltr;list-style-type:disc;margin-bottom:0in;margin-top:0in;unicode-bidi:embed;" type="disc"><li style="color:#505050;margin-bottom:9pt;margin-top:0pt;vertical-align:middle;"><span style="background-color:white;"><span style="font-family:Lato;font-size:13.5pt;">Wealth Management Advisors</span></span></li><li style="color:#505050;margin-bottom:9pt;margin-top:0pt;vertical-align:middle;"><span style="background-color:white;"><span style="font-family:Lato;font-size:13.5pt;">Wealth Managers</span></span></li><li style="color:#505050;margin-bottom:9pt;margin-top:0pt;vertical-align:middle;"><span style="background-color:white;"><span style="font-family:Lato;font-size:13.5pt;">Trust and Fiduciary Advisors</span></span></li><li style="color:#505050;margin-bottom:9pt;margin-top:0pt;vertical-align:middle;"><span style="background-color:white;"><span style="font-family:Lato;font-size:13.5pt;">Trust Officers</span></span></li><li style="color:#505050;margin-bottom:9pt;margin-top:0pt;vertical-align:middle;"><span style="background-color:white;"><span style="font-family:Lato;font-size:13.5pt;">Estate Planners</span></span></li><li style="color:#505050;margin-bottom:9pt;margin-top:0pt;vertical-align:middle;"><span style="background-color:white;"><span style="font-family:Lato;font-size:13.5pt;">Trust Counsel</span></span></li><li style="color:#505050;margin-bottom:9pt;margin-top:0pt;vertical-align:middle;"><span style="background-color:white;"><span style="font-family:Lato;font-size:13.5pt;">Trust Department Managers</span></span></li><li style="color:#505050;margin-bottom:9pt;margin-top:0pt;vertical-align:middle;"><span style="background-color:white;"><span style="font-family:Lato;font-size:13.5pt;">Private Bankers</span></span></li><li style="color:#505050;margin-bottom:9pt;margin-top:0pt;vertical-align:middle;"><span style="background-color:white;"><span style="font-family:Lato;font-size:13.5pt;">Trust Tax Professionals</span></span></li><li style="color:#505050;margin-bottom:9pt;margin-top:0pt;vertical-align:middle;"><span style="background-color:white;"><span style="font-family:Lato;font-size:13.5pt;">Financial Planners</span></span></li><li style="color:#505050;margin-bottom:9pt;margin-top:0pt;vertical-align:middle;"><span style="background-color:white;"><span style="font-family:Lato;font-size:13.5pt;">CTFAs, CISPs, CRSPs, CPAs, CFPs</span></span></li></ul><p style="color:#4E5665;font-family:&quot;Playfair Display&quot;;font-size:25.5pt;margin-bottom:7pt;margin-top:19pt;"><span style="background-color:white;"><strong>Credits</strong></span></p><p style="font-family:Lato;font-size:13.5pt;margin-bottom:11pt;margin-top:0pt;"><span style="background-color:white;color:#505050;">ABA Professional Certifications: 1.25&nbsp;</span><a href="https://www.aba.com/training-events/certifications/certified-aml-and-fraud-professional"><span style="background-color:white;"><strong>CAFP</strong></span></a><span style="background-color:white;color:#505050;">, 1.25&nbsp;</span><a href="https://www.aba.com/training-events/certifications/certified-trust-and-fiduciary-advisor"><span style="background-color:white;"><strong>CTFA</strong></span></a><span style="background-color:white;color:#505050;">; 1.2 CPE (Specialized Knowledge); 1.0 CFP</span></p><p style="color:#505050;font-family:Lato;font-size:13.5pt;margin-bottom:11pt;margin-top:0pt;"><span style="background-color:white;">The Certified Financial Planners Board has granted 1.0 credit for this live webinar. Recordings are not eligible for CFP credits.</span></p><p style="color:#505050;font-family:Lato;font-size:13.5pt;margin-bottom:11pt;margin-top:0pt;"><span style="background-color:white;">This intermediate level, Group Internet-based webinar is eligible for 1.2 CPEs for CPAs (various fields of study). Recordings are not eligible for CPE credits.</span></p><p style="color:#505050;font-family:Lato;font-size:13.5pt;margin-bottom:11pt;margin-top:0pt;"><span style="background-color:white;"><strong>Prerequisite</strong>&nbsp;— Attendees should have background knowledge of the field of wealth management and trust within the financial services industry.</span></p><p style="color:#505050;font-family:Lato;font-size:13.5pt;margin-bottom:11pt;margin-top:0pt;"><span style="background-color:white;"><strong>Advanced Preparation&nbsp;</strong>— None</span></p><p style="font-family:Lato;font-size:13.5pt;margin-bottom:11pt;margin-top:0pt;"><span style="background-color:white;color:#505050;">For more information regarding refund, complaint and program cancellation policies, contact American Bankers Association at&nbsp;</span><a href="tel:1-800-BANKERS"><span style="background-color:white;"><strong>1-800-BANKERS</strong></span></a><span style="background-color:white;color:#505050;">.</span></p><p style="color:#505050;font-family:Lato;font-size:13.5pt;margin-bottom:11pt;margin-top:0pt;"><span style="background-color:white;"><i>Credits are subject to change.</i></span></p></div>
